# Staging deploy: push to `staging` or run manually. Requires Cloudflare Pages secrets (see README).
name: Deploy staging to Cloudflare Pages

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: cloudflare-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_DEPLOY_ENV: staging
          # Optional: set VITE_GA_MEASUREMENT_ID_STAGING for a separate GA4 stream
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID_STAGING }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: random-bible-verse-staging
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: staging

      - name: Ensure staging custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bash scripts/ensure-pages-domain.sh "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" random-bible-verse-staging staging.hidden.swlabs.cc
